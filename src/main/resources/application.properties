quarkus.application.name=webtech
quarkus.http.host=0.0.0.0
quarkus.http.port=${PORT:8080}

quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.db-name=webtech
%dev.quarkus.datasource.devservices.username=postgres
%dev.quarkus.datasource.devservices.password=postgres
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL:${DB_URL}}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.min-size=1
%prod.quarkus.datasource.jdbc.max-size=10
%prod.quarkus.datasource.jdbc.acquisition-timeout=60S

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.jdbc.timezone=UTC
%test.quarkus.hibernate-orm.active=false
%test.quarkus.datasource.active=false

%dev.dishly.jwt.secret=${JWT_SECRET:dishly-smart-test-secret-please-change-in-production}
%test.dishly.jwt.secret=${JWT_SECRET:dishly-smart-test-secret-please-change-in-production}
%prod.dishly.jwt.secret=${JWT_SECRET}
dishly.jwt.issuer=${JWT_ISSUER:dishly-smart}
dishly.jwt.expires-in-seconds=${JWT_EXPIRES_IN_SECONDS:3600}
quarkus.http.auth.proactive=false

quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:5173
%prod.quarkus.http.cors.origins=${CORS_ORIGINS}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=Dishly Smart Recipe API
mp.openapi.extensions.smallrye.info.version=0.0.1-SNAPSHOT
mp.openapi.extensions.smallrye.info.description=Quarkus backend API for Dishly Smart recipe management.
