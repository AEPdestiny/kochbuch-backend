name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: dishly-smart-test-secret-please-change-in-production
      JWT_ISSUER: dishly-smart
      JWT_EXPIRES_IN_SECONDS: '3600'
      CORS_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Backend tests
        run: ./gradlew test

      - name: Checkstyle main
        run: ./gradlew checkstyleMain

      - name: Checkstyle test
        run: ./gradlew checkstyleTest

      - name: Full backend check
        run: ./gradlew check
